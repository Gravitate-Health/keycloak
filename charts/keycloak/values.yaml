# Default values for keycloak.

replicaCount: 1

image:
  repository: quay.io/keycloak/keycloak
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '9090'

deploymentAnnotations:
  prometheus.io/scrape: "true"

podAnnotations: {}

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

networking:
  # networking.type: choose between 'istio', 'ingress', or 'none'
  type: istio
  
  istio:
    gateways:
      - gh-gateway
    hosts:
      - "*"
      
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: fosps.gravitatehealth.eu
        paths:
          - path: /auth
            pathType: Prefix
    tls: []

config:
  # Admin credentials
  adminUser: "admin"
  # adminPassword should be set via --set config.adminPassword=...
  adminPassword: "admin"
  
  # Database configuration
  dbName: "keycloak"
  dbUsername: "keycloak"
  # dbSecretName is the name of the secret containing the DB password
  dbSecretName: "keycloak-helm-postgresql"
  dbSecretKey: "password"
  dbUrl: "jdbc:postgresql://keycloak-helm-postgresql/keycloak"
  dbSchema: "public"
  
  # Keycloak specific configuration
  httpRelativePath: "/auth"
  frontendUrl: "https://fosps.gravitatehealth.eu/auth"
  hostname: "fosps.gravitatehealth.eu"
  hostnameStrict: "false"
  proxy: "edge"
  httpEnabled: "true"

extraEnv: []
